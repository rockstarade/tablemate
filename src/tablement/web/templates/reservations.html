<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tablepass — My Reservations</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a',
                            300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b',
                            600: '#d97706', 700: '#b45309',
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .glass-light {
            background: rgba(51, 65, 85, 0.35);
            backdrop-filter: blur(10px);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.4s ease-out; }
        .fade-in-delay-1 { animation: fadeInUp 0.4s ease-out 0.1s both; }
        .fade-in-delay-2 { animation: fadeInUp 0.4s ease-out 0.2s both; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(51,65,85,0.3) 25%, rgba(51,65,85,0.6) 50%, rgba(51,65,85,0.3) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 0.75rem;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }
        .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast-enter { animation: slideInRight 0.3s ease-out; }

        @keyframes celebrateIn {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            60% { opacity: 1; transform: scale(1.02) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .celebrate-in { animation: celebrateIn 0.5s ease-out; }

        .confirmed-glow {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.12), 0 0 60px rgba(16, 185, 129, 0.04);
        }

        /* Card hover */
        .reservation-card {
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out, border-color 0.2s ease-out;
        }
        .reservation-card:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="text-slate-200 antialiased" x-data="reservationsApp()" x-init="init()">

    <!-- Toast -->
    <div x-show="toast.show" x-cloak class="fixed top-6 right-6 z-[100] max-w-sm toast-enter">
        <div class="glass rounded-xl border border-slate-700/50 px-5 py-3.5 flex items-center gap-3 shadow-2xl">
            <span class="text-lg" x-text="toast.icon"></span>
            <p class="text-sm text-slate-200" x-text="toast.message"></p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 inset-x-0 z-50 border-b border-slate-700/50 glass">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a href="/browse" class="flex items-center gap-2">
                    <span class="text-xl font-medium text-white" style="font-family: 'Manrope', sans-serif; letter-spacing: 0.1em;">tablepass</span>
                </a>
            </div>
            <div class="hidden sm:flex items-center gap-6">
                <a href="/browse" class="text-slate-400 hover:text-white text-sm transition-colors">Home</a>
                <a href="/reservations" class="text-white font-medium text-sm">My Reservations</a>
                <a href="/settings" class="text-slate-400 hover:text-white text-sm transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </a>
                <button @click="signOut()" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">Sign Out</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 pb-20 fade-in">
        <div class="max-w-3xl mx-auto px-6">
            <h1 class="text-3xl font-bold text-white mb-2">My Reservations</h1>
            <p class="text-slate-400 text-sm mb-8" x-text="summaryText()"></p>

            <!-- Filter tabs -->
            <div class="flex gap-1 mb-8 bg-slate-800/40 rounded-xl p-1 w-fit">
                <template x-for="tab in tabs" :key="tab.key">
                    <button @click="filter = tab.key"
                        class="px-4 py-2 rounded-lg text-sm font-medium transition-all"
                        :class="filter === tab.key ? 'bg-brand-500 text-slate-900' : 'text-slate-400 hover:text-white'">
                        <span x-text="tab.label"></span>
                        <span x-show="tab.key !== 'all'" class="ml-1 text-xs opacity-70"
                            x-text="'(' + filteredReservations(tab.key).length + ')'"></span>
                    </button>
                </template>
            </div>

            <!-- Loading skeletons -->
            <div x-show="loading">
                <div class="skeleton h-32 w-full mb-4"></div>
                <div class="skeleton h-32 w-full mb-4"></div>
                <div class="skeleton h-32 w-full"></div>
            </div>

            <!-- Reservation cards -->
            <div x-show="!loading" x-cloak class="space-y-4">
                <template x-for="(r, idx) in filteredReservations(filter)" :key="r.id">

                    <!-- ===== CONFIRMED BOOKING — Premium Confirmation Card ===== -->
                    <div x-show="r.status === 'confirmed'" class="reservation-card glass rounded-2xl border border-emerald-500/30 confirmed-glow overflow-hidden celebrate-in">
                        <!-- Green top accent bar -->
                        <div class="h-1 bg-gradient-to-r from-emerald-500 to-emerald-400"></div>
                        <div class="p-6">
                            <div class="flex items-start justify-between">
                                <div>
                                    <div class="flex items-center gap-2.5 mb-1">
                                        <span class="text-emerald-400 text-lg">✓</span>
                                        <span class="text-emerald-400 text-sm font-semibold uppercase tracking-wide">You're in!</span>
                                    </div>
                                    <h3 class="text-2xl font-bold text-white mb-3" x-text="r.venue_name"></h3>
                                    <div class="space-y-2">
                                        <div class="flex items-center gap-3 text-slate-300">
                                            <svg class="w-4.5 h-4.5 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                            <span class="text-sm" x-text="formatDateFull(r.target_date)"></span>
                                        </div>
                                        <div class="flex items-center gap-3 text-slate-300">
                                            <svg class="w-4.5 h-4.5 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                            <span class="text-sm" x-text="'Party of ' + r.party_size"></span>
                                        </div>
                                        <div x-show="r.time_preferences && r.time_preferences.length" class="flex items-center gap-3 text-slate-300">
                                            <svg class="w-4.5 h-4.5 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                            <span class="text-sm" x-text="formatTimePrefs(r.time_preferences)"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex flex-col items-end gap-2">
                                    <span class="px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-xs font-semibold">Confirmed</span>
                                </div>
                            </div>

                            <!-- Booking receipt -->
                            <div x-show="r.elapsed_seconds" class="mt-4 pt-4 border-t border-slate-700/30">
                                <p class="text-slate-500 text-xs" x-text="bookingReceipt(r)"></p>
                            </div>

                            <!-- Actions -->
                            <div class="mt-4 flex gap-3">
                                <a :href="calendarLink(r)" target="_blank"
                                    class="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-600/50 text-slate-300 text-sm hover:text-white hover:border-slate-500 transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    Add to Calendar
                                </a>
                                <a :href="'/restaurant/' + r.venue_id"
                                    class="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-brand-500/30 text-brand-400 text-sm hover:bg-brand-500/10 transition-all">
                                    Book Again
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- ===== ACTIVE RESERVATION — Live tracking ===== -->
                    <div x-show="isActive(r.status)" class="reservation-card glass rounded-2xl border border-slate-700/30 p-6 hover:border-slate-600/50">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-lg font-semibold text-white" x-text="r.venue_name"></h3>
                                    <span class="px-2.5 py-0.5 rounded-full text-xs font-medium"
                                        :class="statusClass(r.status)"
                                        x-text="statusLabel(r.status)"></span>
                                </div>
                                <div class="flex flex-wrap items-center gap-4 text-sm text-slate-400">
                                    <span class="flex items-center gap-1.5">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                        <span x-text="formatDate(r.target_date)"></span>
                                    </span>
                                    <span class="flex items-center gap-1.5">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                        <span x-text="'Party of ' + r.party_size"></span>
                                    </span>
                                </div>

                                <!-- Time preferences -->
                                <div x-show="r.time_preferences && r.time_preferences.length > 0" class="flex gap-2 mt-3 flex-wrap">
                                    <template x-for="tp in (r.time_preferences || [])" :key="tp.time">
                                        <span class="px-2.5 py-1 rounded-lg bg-slate-800/60 text-xs text-slate-400"
                                            x-text="formatTime(tp.time)"></span>
                                    </template>
                                </div>

                                <!-- Live status -->
                                <div x-show="r._live" class="mt-3 flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full pulse-dot"
                                        :class="r.status === 'sniping' ? 'bg-brand-400' : 'bg-blue-400'"></span>
                                    <span class="text-xs font-medium"
                                        :class="r.status === 'sniping' ? 'text-brand-400' : 'text-blue-400'"
                                        x-text="r._liveMessage || statusLabel(r.status)"></span>
                                </div>
                            </div>

                            <!-- Action buttons -->
                            <div class="flex flex-col gap-2 flex-shrink-0">
                                <button @click="startModify(r)"
                                    class="px-3 py-1.5 rounded-lg border border-brand-500/30 text-brand-400 text-xs hover:bg-brand-500/10 transition-colors whitespace-nowrap">
                                    Modify
                                </button>
                                <button @click="cancelReservation(r.id)"
                                    class="px-3 py-1.5 rounded-lg border border-red-500/30 text-red-400 text-xs hover:bg-red-500/10 transition-colors">
                                    Cancel
                                </button>
                            </div>
                        </div>

                        <!-- Modify inline form -->
                        <div x-show="modifyingResId === r.id" x-cloak x-transition
                            class="mt-4 p-4 rounded-xl space-y-3" style="background: rgba(30,41,59,0.5); border: 1px solid rgba(245,158,11,0.2);">
                            <p class="text-xs font-semibold uppercase tracking-wider text-brand-400">Modify Reservation</p>
                            <div>
                                <label class="text-[11px] font-medium mb-1 block text-slate-400">Date</label>
                                <input type="date" x-model="modifyDate"
                                    class="w-full px-3 py-2 rounded-lg text-sm bg-slate-800/60 border border-slate-600/50 text-white focus:outline-none focus:border-brand-500">
                            </div>
                            <div>
                                <label class="text-[11px] font-medium mb-1 block text-slate-400">Party Size</label>
                                <select x-model="modifyPartySize"
                                    class="w-full px-3 py-2 rounded-lg text-sm bg-slate-800/60 border border-slate-600/50 text-white focus:outline-none focus:border-brand-500">
                                    <template x-for="n in [1,2,3,4,5,6,7,8]" :key="n">
                                        <option :value="n" x-text="n + (n === 1 ? ' guest' : ' guests')"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="text-[11px] font-medium mb-1 block text-slate-400">Preferred Time</label>
                                <input type="time" x-model="modifyTime"
                                    class="w-full px-3 py-2 rounded-lg text-sm bg-slate-800/60 border border-slate-600/50 text-white focus:outline-none focus:border-brand-500">
                            </div>
                            <div class="flex gap-2 pt-1">
                                <button @click="submitModify(r)" :disabled="modifySubmitting || !modifyDate"
                                    class="flex-1 py-2 rounded-lg text-xs font-bold bg-brand-500 text-slate-900 transition-all disabled:opacity-50">
                                    <span x-show="!modifySubmitting">Save Changes</span>
                                    <span x-show="modifySubmitting">Saving...</span>
                                </button>
                                <button @click="modifyingResId = null"
                                    class="flex-1 py-2 rounded-lg text-xs font-medium border border-slate-600/50 text-slate-400">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ===== FAILED RESERVATION ===== -->
                    <div x-show="r.status === 'failed'" class="reservation-card glass rounded-2xl border border-red-500/20 p-6">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-lg font-semibold text-white" x-text="r.venue_name"></h3>
                                    <span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-500/20 text-red-400">No luck this time</span>
                                </div>
                                <div class="flex flex-wrap items-center gap-4 text-sm text-slate-400 mb-2">
                                    <span x-text="formatDate(r.target_date)"></span>
                                    <span x-text="'Party of ' + r.party_size"></span>
                                </div>
                                <p x-show="r.error" class="text-red-400/70 text-xs" x-text="friendlyError(r.error)"></p>
                            </div>
                            <a :href="'/restaurant/' + r.venue_id"
                                class="px-4 py-2 rounded-lg border border-brand-500/30 text-brand-400 text-xs hover:bg-brand-500/10 transition-colors flex-shrink-0 whitespace-nowrap">
                                Try Again
                            </a>
                        </div>
                    </div>

                    <!-- ===== CANCELLED / DRY RUN / OTHER ===== -->
                    <div x-show="r.status === 'cancelled' || r.status === 'dry_run'" class="reservation-card glass rounded-2xl border border-slate-700/20 p-6 opacity-60">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-lg font-semibold text-white" x-text="r.venue_name"></h3>
                                    <span class="px-2.5 py-0.5 rounded-full text-xs font-medium"
                                        :class="r.status === 'dry_run' ? 'bg-cyan-500/20 text-cyan-400' : 'bg-slate-500/20 text-slate-400'"
                                        x-text="r.status === 'dry_run' ? 'Test Run' : 'Cancelled'"></span>
                                </div>
                                <div class="flex flex-wrap items-center gap-4 text-sm text-slate-500">
                                    <span x-text="formatDate(r.target_date)"></span>
                                    <span x-text="'Party of ' + r.party_size"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                </template>
            </div>

            <!-- Empty state -->
            <div x-show="!loading && reservations.length === 0" x-cloak class="text-center py-20">
                <div class="text-5xl mb-4">🍽</div>
                <h3 class="text-xl font-semibold text-white mb-2">No reservations yet</h3>
                <p class="text-slate-400 mb-6">Browse restaurants and let us handle the hard part.</p>
                <a href="/browse"
                    class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-brand-500 hover:bg-brand-400 text-slate-900 font-semibold text-sm transition-all">
                    Browse Restaurants
                </a>
            </div>

            <!-- Empty filtered state -->
            <div x-show="!loading && reservations.length > 0 && filteredReservations(filter).length === 0" x-cloak class="text-center py-12">
                <p class="text-slate-400 text-sm">No <span x-text="currentTabLabel()"></span> reservations.</p>
            </div>
        </div>
    </main>

    <!-- Mobile bottom nav -->
    <nav class="fixed bottom-0 inset-x-0 z-50 glass border-t border-slate-700/50 sm:hidden">
        <div class="flex items-center justify-around py-3">
            <a href="/browse" class="flex flex-col items-center gap-1 text-slate-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a href="/reservations" class="flex flex-col items-center gap-1 text-brand-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <span class="text-[10px] font-medium">Reservations</span>
            </a>
            <a href="/settings" class="flex flex-col items-center gap-1 text-slate-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-[10px] font-medium">Settings</span>
            </a>
        </div>
    </nav>

    <script>
    function reservationsApp() {
        return {
            reservations: [],
            loading: true,
            filter: 'all',
            token: localStorage.getItem('tablement_token'),
            eventSources: {},
            toast: { show: false, message: '', icon: '' },
            modifyingResId: null,
            modifyDate: '',
            modifyPartySize: 2,
            modifyTime: '',
            modifySubmitting: false,

            tabs: [
                { key: 'all', label: 'All' },
                { key: 'active', label: 'Active' },
                { key: 'confirmed', label: 'Confirmed' },
                { key: 'history', label: 'History' },
            ],

            async init() {
                if (!this.token) {
                    window.location.href = '/';
                    return;
                }
                await this.loadReservations();
            },

            async loadReservations() {
                try {
                    const resp = await fetch('/api/reservations/', {
                        headers: { 'Authorization': 'Bearer ' + this.token },
                    });
                    if (resp.status === 401) {
                        window.location.href = '/';
                        return;
                    }
                    const data = await resp.json();
                    this.reservations = (data.reservations || []).map(r => ({
                        ...r,
                        _live: false,
                        _liveMessage: '',
                    }));

                    // Connect SSE for active reservations
                    this.reservations.forEach(r => {
                        if (this.isActive(r.status)) {
                            this.connectSSE(r);
                        }
                    });
                } catch (e) {
                    console.error('Failed to load reservations:', e);
                } finally {
                    this.loading = false;
                }
            },

            connectSSE(reservation) {
                const id = reservation.id;
                if (this.eventSources[id]) return;

                const url = `/api/reservations/${id}/events`;
                const es = new EventSource(url);
                this.eventSources[id] = es;
                reservation._live = true;

                es.addEventListener('snipe_phase', (e) => {
                    const data = JSON.parse(e.data);
                    reservation._liveMessage = this.friendlyPhaseMessage(data);
                    reservation.status = this.mapPhaseToStatus(data.phase);
                });

                es.addEventListener('snipe_attempt', (e) => {
                    const data = JSON.parse(e.data);
                    reservation._liveMessage = this.friendlyAttemptMessage(data);
                    reservation.attempts = data.attempt;
                });

                es.addEventListener('countdown_tick', (e) => {
                    const data = JSON.parse(e.data);
                    const secs = Math.ceil(data.seconds_remaining);
                    if (secs > 3600) {
                        const h = Math.floor(secs / 3600);
                        const m = Math.floor((secs % 3600) / 60);
                        reservation._liveMessage = `Ready in ${h}h ${m}m`;
                    } else if (secs > 60) {
                        const m = Math.floor(secs / 60);
                        const s = secs % 60;
                        reservation._liveMessage = `Ready in ${m}m ${s}s`;
                    } else {
                        reservation._liveMessage = `Almost there... ${secs}s`;
                    }
                });

                es.addEventListener('snipe_result', (e) => {
                    const data = JSON.parse(e.data);
                    reservation._live = false;
                    if (data.success) {
                        reservation.status = 'confirmed';
                        reservation._liveMessage = '';
                        reservation.elapsed_seconds = data.elapsed_seconds || reservation.elapsed_seconds;
                        reservation.attempts = data.attempts || reservation.attempts;
                        this.showToast("You're in! Reservation confirmed.", '🎉');
                    } else {
                        reservation.status = data.dry_run ? 'dry_run' : 'failed';
                        reservation.error = data.error;
                        reservation._liveMessage = '';
                        if (data.dry_run) {
                            this.showToast('Test run complete', '✅');
                        }
                    }
                    es.close();
                    delete this.eventSources[id];
                });

                es.onerror = () => {
                    reservation._live = false;
                    es.close();
                    delete this.eventSources[id];
                };
            },

            // --- Consumer-friendly message mapping ---

            friendlyPhaseMessage(data) {
                const phase = data.phase;
                if (phase === 'waiting') return 'Getting ready...';
                if (phase === 'authenticating') return 'Connecting to Resy...';
                if (phase === 'warming') return 'Warming up...';
                if (phase === 'sniping') return 'Looking for your table...';
                if (phase === 'monitoring') return 'Watching for openings...';
                return data.message || 'Working on it...';
            },

            friendlyAttemptMessage(data) {
                if (data.slots_found > 0) {
                    return `Found ${data.slots_found} opening${data.slots_found > 1 ? 's' : ''} — booking now!`;
                }
                return 'Watching for openings...';
            },

            mapPhaseToStatus(phase) {
                const map = {
                    'waiting': 'scheduled',
                    'authenticating': 'scheduled',
                    'warming': 'scheduled',
                    'sniping': 'sniping',
                    'monitoring': 'monitoring',
                    'done': 'completed',
                };
                return map[phase] || phase;
            },

            isActive(status) {
                return ['scheduled', 'monitoring', 'sniping'].includes(status);
            },

            filteredReservations(tab) {
                if (tab === 'all') return this.reservations;
                if (tab === 'active') return this.reservations.filter(r => this.isActive(r.status));
                if (tab === 'confirmed') return this.reservations.filter(r => r.status === 'confirmed');
                if (tab === 'history') return this.reservations.filter(r =>
                    ['failed', 'cancelled', 'dry_run'].includes(r.status));
                return this.reservations;
            },

            currentTabLabel() {
                const tab = this.tabs.find(t => t.key === this.filter);
                return tab ? tab.label.toLowerCase() : '';
            },

            summaryText() {
                const active = this.reservations.filter(r => this.isActive(r.status)).length;
                const confirmed = this.reservations.filter(r => r.status === 'confirmed').length;
                const parts = [];
                if (active > 0) parts.push(`${active} active`);
                if (confirmed > 0) parts.push(`${confirmed} confirmed`);
                return parts.length ? parts.join(' · ') : 'No active reservations';
            },

            async cancelReservation(id) {
                try {
                    const resp = await fetch(`/api/reservations/${id}/cancel`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + this.token },
                    });
                    if (resp.ok) {
                        const r = this.reservations.find(r => r.id === id);
                        if (r) {
                            r.status = 'cancelled';
                            r._live = false;
                        }
                        if (this.eventSources[id]) {
                            this.eventSources[id].close();
                            delete this.eventSources[id];
                        }
                        this.showToast('Reservation cancelled', '✅');
                    }
                } catch (e) {
                    console.error('Cancel failed:', e);
                }
            },

            startModify(res) {
                this.modifyingResId = res.id;
                this.modifyDate = res.target_date || '';
                this.modifyPartySize = res.party_size || 2;
                this.modifyTime = res.time_preferences?.[0]?.time || '';
            },

            async submitModify(res) {
                if (this.modifySubmitting || !this.modifyDate) return;
                this.modifySubmitting = true;
                const origDate = res.target_date;
                const origParty = res.party_size;
                const origTimePrefs = res.time_preferences || [];
                let cancelled = false;
                try {
                    const timePrefs = this.modifyTime ? [{ time: this.modifyTime, seating_type: null }] : origTimePrefs;
                    const payload = {
                        venue_id: res.venue_id, venue_name: res.venue_name,
                        party_size: parseInt(this.modifyPartySize),
                        dates: [this.modifyDate],
                        time_preferences: timePrefs,
                        drop_time: null, book_earliest: true,
                        platform: 'resy',
                    };

                    // Cancel old reservation
                    const cancelResp = await fetch(`/api/reservations/${res.id}/cancel`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + this.token },
                    });
                    if (!cancelResp.ok) throw new Error('Failed to cancel original');
                    cancelled = true;
                    if (this.eventSources[res.id]) { this.eventSources[res.id].close(); delete this.eventSources[res.id]; }

                    // Create new reservation
                    const resp = await fetch('/api/reservations/batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
                        body: JSON.stringify(payload),
                    });
                    if (!resp.ok) {
                        const errData = await resp.json().catch(() => ({}));
                        throw new Error(errData.detail || 'Failed to create modified reservation');
                    }

                    this.modifyingResId = null;
                    this.showToast('Reservation modified', '✅');
                    await this.loadReservations();
                } catch (e) {
                    if (cancelled) {
                        // Rollback: restore original reservation
                        try {
                            const rollbackPayload = {
                                venue_id: res.venue_id, venue_name: res.venue_name,
                                party_size: origParty, dates: [origDate],
                                time_preferences: origTimePrefs,
                                drop_time: null, book_earliest: true, platform: 'resy',
                            };
                            const rb = await fetch('/api/reservations/batch', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
                                body: JSON.stringify(rollbackPayload),
                            });
                            if (rb.ok) {
                                this.showToast('Modify failed — original restored', '⚠️');
                                await this.loadReservations();
                            } else {
                                this.showToast('Modify failed — please re-create manually', '❌');
                            }
                        } catch (_) {
                            this.showToast('Modify failed — please re-create manually', '❌');
                        }
                    } else {
                        this.showToast(e.message || 'Modification failed', '❌');
                    }
                } finally {
                    this.modifySubmitting = false;
                }
            },

            // --- Status display ---

            statusClass(status) {
                const map = {
                    'scheduled': 'bg-blue-500/20 text-blue-400',
                    'monitoring': 'bg-purple-500/20 text-purple-400',
                    'sniping': 'bg-brand-500/20 text-brand-400',
                    'confirmed': 'bg-emerald-500/20 text-emerald-400',
                    'failed': 'bg-red-500/20 text-red-400',
                    'cancelled': 'bg-slate-500/20 text-slate-400',
                    'dry_run': 'bg-cyan-500/20 text-cyan-400',
                };
                return map[status] || 'bg-slate-500/20 text-slate-400';
            },

            statusLabel(status) {
                const map = {
                    'scheduled': 'Scheduled',
                    'monitoring': 'Watching for openings',
                    'sniping': 'Finding your table',
                    'confirmed': "You're in!",
                    'failed': 'No luck this time',
                    'cancelled': 'Cancelled',
                    'dry_run': 'Test Run',
                };
                return map[status] || status;
            },

            // --- Friendly error messages ---

            friendlyError(error) {
                if (!error) return '';
                if (error.includes('Retry window exhausted')) return 'The restaurant was fully booked before we could grab a spot.';
                if (error.includes('No matching slots')) return 'No tables were available at your preferred times.';
                if (error.includes('auto-cancelled')) return 'Another date in your group was confirmed instead.';
                if (error.includes('Book token')) return 'A table appeared but was taken before we could confirm it.';
                return 'We couldn\'t get this one. The restaurant may have been fully booked.';
            },

            // --- Booking receipt ---

            bookingReceipt(r) {
                if (!r.elapsed_seconds) return '';
                const secs = r.elapsed_seconds;
                if (secs < 1) {
                    return `Booked in ${Math.round(secs * 1000)}ms`;
                }
                return `Booked in ${secs.toFixed(1)}s`;
            },

            // --- Google Calendar link ---

            calendarLink(r) {
                const dateStr = r.target_date.replace(/-/g, '');
                // Default to 7 PM if no time preferences
                let timeStr = '190000';
                if (r.time_preferences && r.time_preferences.length > 0) {
                    const t = r.time_preferences[0].time.replace(/:/g, '') + '00';
                    timeStr = t.padStart(6, '0');
                }
                const startDT = dateStr + 'T' + timeStr;
                // End = start + 2 hours
                const startH = parseInt(timeStr.substring(0, 2));
                const endH = String(Math.min(startH + 2, 23)).padStart(2, '0');
                const endDT = dateStr + 'T' + endH + timeStr.substring(2);

                const params = new URLSearchParams({
                    action: 'TEMPLATE',
                    text: `Dinner at ${r.venue_name}`,
                    dates: `${startDT}/${endDT}`,
                    details: `Party of ${r.party_size}\nBooked via Tablement`,
                    ctz: 'America/New_York',
                });
                return `https://calendar.google.com/calendar/render?${params.toString()}`;
            },

            // --- Formatting ---

            formatDate(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr + 'T12:00:00');
                return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            },

            formatDateFull(dateStr) {
                if (!dateStr) return '';
                const d = new Date(dateStr + 'T12:00:00');
                return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            },

            formatTime(timeStr) {
                if (!timeStr) return '';
                const [h, m] = timeStr.split(':').map(Number);
                const ampm = h >= 12 ? 'PM' : 'AM';
                const hour = h > 12 ? h - 12 : (h === 0 ? 12 : h);
                return `${hour}:${String(m).padStart(2, '0')} ${ampm}`;
            },

            formatTimePrefs(prefs) {
                if (!prefs || prefs.length === 0) return '';
                return prefs.map(p => this.formatTime(p.time)).join(', ');
            },

            showToast(message, icon = '✅') {
                this.toast = { show: true, message, icon };
                setTimeout(() => { this.toast.show = false; }, 3000);
            },

            signOut() {
                Object.values(this.eventSources).forEach(es => es.close());
                localStorage.removeItem('tablement_token');
                localStorage.removeItem('tablement_refresh');
                window.location.href = '/';
            },
        }
    }
    </script>
</body>

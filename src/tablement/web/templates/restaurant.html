<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a',
                            300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b',
                            600: '#d97706', 700: '#b45309',
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.4s ease-out; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(51,65,85,0.3) 25%, rgba(51,65,85,0.6) 50%, rgba(51,65,85,0.3) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 0.75rem;
        }

        /* Calendar date cell */
        .cal-cell {
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .cal-cell:hover:not(.cal-past):not(.cal-empty) {
            transform: scale(1.08);
        }

        /* Time pill */
        .time-pill {
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .time-pill:hover {
            transform: translateY(-1px);
        }

        /* Toast */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter { animation: slideInRight 0.3s ease-out; }
    </style>
</head>
<body class="text-slate-200 antialiased" x-data="restaurantApp()" x-init="init()" x-cloak>

    <!-- Header -->
    <header class="sticky top-0 z-50 glass border-b border-slate-700/50">
        <div class="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/browse" class="flex items-center gap-2 text-slate-400 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                <span class="text-sm">Back</span>
            </a>
            <span class="text-sm font-medium text-brand-400">tablement</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-lg mx-auto px-4 pt-6 pb-32">

        <!-- Loading skeleton -->
        <template x-if="loading">
            <div>
                <div class="skeleton h-8 w-48 mb-3"></div>
                <div class="skeleton h-5 w-32 mb-6"></div>
                <div class="skeleton h-72 w-full mb-4"></div>
                <div class="skeleton h-12 w-full"></div>
            </div>
        </template>

        <!-- Restaurant header -->
        <template x-if="!loading && restaurant">
            <div class="fade-in">
                <!-- Name + meta -->
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-white" x-text="restaurant.name"></h1>
                    <p class="text-sm text-slate-400 mt-1">
                        <span x-text="restaurant.cuisine"></span>
                        <span class="mx-1.5 text-slate-600">&bull;</span>
                        <span x-text="restaurant.neighborhood"></span>
                    </p>
                </div>

                <!-- ==================== CALENDAR ==================== -->
                <div class="glass rounded-2xl border border-slate-700/50 p-4 mb-4">
                    <!-- Month nav -->
                    <div class="flex items-center justify-between mb-4">
                        <button @click="prevMonth()" class="p-2 rounded-lg hover:bg-slate-700/50 transition text-slate-400 hover:text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                            </svg>
                        </button>
                        <h2 class="text-lg font-semibold text-white" x-text="monthLabel"></h2>
                        <button @click="nextMonth()" class="p-2 rounded-lg hover:bg-slate-700/50 transition text-slate-400 hover:text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Weekday headers -->
                    <div class="grid grid-cols-7 mb-2">
                        <template x-for="d in ['Su','Mo','Tu','We','Th','Fr','Sa']">
                            <div class="text-center text-xs font-medium text-slate-500 py-1" x-text="d"></div>
                        </template>
                    </div>

                    <!-- Calendar grid -->
                    <div class="grid grid-cols-7 gap-1">
                        <template x-for="cell in calendarCells" :key="cell.key">
                            <div
                                class="cal-cell aspect-square flex items-center justify-center rounded-xl text-sm font-medium relative"
                                :class="cellClasses(cell)"
                                @click="cell.day && !cell.isPast && toggleDate(cell.dateStr)"
                            >
                                <span x-text="cell.day || ''"></span>
                                <!-- Today indicator -->
                                <div x-show="cell.isToday" class="absolute inset-0 rounded-xl ring-1 ring-white/30 pointer-events-none"></div>
                            </div>
                        </template>
                    </div>

                    <!-- Legend -->
                    <div class="flex items-center gap-4 mt-4 pt-3 border-t border-slate-700/30">
                        <div class="flex items-center gap-1.5">
                            <div class="w-3 h-3 rounded bg-red-500/20 border border-red-400/30"></div>
                            <span class="text-xs text-slate-400">Sold out</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <div class="w-3 h-3 rounded bg-amber-500/20 border border-amber-400/30"></div>
                            <span class="text-xs text-slate-400">Not yet released</span>
                        </div>
                    </div>
                </div>

                <!-- ==================== INFO BANNERS ==================== -->
                <template x-if="hasReleasedSelected">
                    <div class="glass rounded-xl border border-red-500/20 p-3 mb-3 fade-in">
                        <div class="flex items-start gap-2">
                            <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <p class="text-sm text-slate-300">Sold out &mdash; we'll grab it if someone cancels.</p>
                        </div>
                    </div>
                </template>
                <template x-if="hasUnreleasedSelected">
                    <div class="glass rounded-xl border border-amber-500/20 p-3 mb-3 fade-in">
                        <div class="flex items-start gap-2">
                            <svg class="w-4 h-4 text-amber-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <p class="text-sm text-slate-300">Not yet released &mdash; we'll book it the moment it opens.</p>
                        </div>
                    </div>
                </template>

                <!-- ==================== TIME PICKER ==================== -->
                <template x-if="selectedDates.length > 0">
                    <div class="glass rounded-2xl border border-slate-700/50 p-4 mb-4 fade-in">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-sm font-medium text-slate-300">Preferred times</h3>
                            <span class="text-xs text-slate-500">Select all that work</span>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="tp in timePills" :key="tp.time">
                                <button
                                    class="time-pill px-3.5 py-2 rounded-xl text-sm font-medium border"
                                    :class="timeClasses(tp)"
                                    @click="toggleTime(tp.time)"
                                >
                                    <span x-text="tp.label"></span>
                                    <template x-if="tp.isHot && !selectedTimes.includes(tp.time)">
                                        <span class="ml-1 text-orange-400">&#x1F525;</span>
                                    </template>
                                </button>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- ==================== PARTY SIZE ==================== -->
                <template x-if="selectedDates.length > 0 && selectedTimes.length > 0">
                    <div class="glass rounded-2xl border border-slate-700/50 p-4 mb-4 fade-in">
                        <div class="flex items-center justify-between">
                            <h3 class="text-sm font-medium text-slate-300">Party size</h3>
                            <div class="flex items-center gap-3">
                                <button
                                    @click="partySize = Math.max(1, partySize - 1)"
                                    class="w-8 h-8 rounded-lg border border-slate-600 flex items-center justify-center text-slate-400 hover:text-white hover:border-slate-500 transition"
                                >
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-width="2" d="M20 12H4"/>
                                    </svg>
                                </button>
                                <span class="text-lg font-semibold text-white w-6 text-center tabular-nums" x-text="partySize"></span>
                                <button
                                    @click="partySize = Math.min(20, partySize + 1)"
                                    class="w-8 h-8 rounded-lg border border-slate-600 flex items-center justify-center text-slate-400 hover:text-white hover:border-slate-500 transition"
                                >
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ==================== EARLIEST AVAILABLE TOGGLE ==================== -->
                <template x-if="releasedCount >= 2">
                    <div class="glass rounded-2xl border border-slate-700/50 p-4 mb-4 fade-in">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-sm font-medium text-slate-300">Book earliest available</h3>
                                <p class="text-xs text-slate-500 mt-0.5">We'll book the first cancellation we find</p>
                            </div>
                            <button
                                @click="bookEarliest = !bookEarliest"
                                class="relative w-11 h-6 rounded-full transition-colors"
                                :class="bookEarliest ? 'bg-brand-500' : 'bg-slate-600'"
                            >
                                <span
                                    class="absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform"
                                    :class="bookEarliest ? 'translate-x-5' : ''"
                                ></span>
                            </button>
                        </div>
                    </div>
                </template>

                <!-- ==================== LATEST NOTIFY ==================== -->
                <template x-if="releasedCount >= 1">
                    <div class="glass rounded-2xl border border-slate-700/50 p-4 mb-4 fade-in">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-sm font-medium text-slate-300">Stop watching</h3>
                                <p class="text-xs text-slate-500 mt-0.5">Latest you'd want a reservation</p>
                            </div>
                            <select
                                x-model="latestNotify"
                                class="bg-slate-700/50 border border-slate-600 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-brand-500"
                            >
                                <option value="2">2h before</option>
                                <option value="4">4h before</option>
                                <option value="6">6h before</option>
                                <option value="12">Same day morning</option>
                                <option value="24">Day before</option>
                            </select>
                        </div>
                    </div>
                </template>

                <!-- ==================== SELECTED SUMMARY ==================== -->
                <template x-if="selectedDates.length > 0">
                    <div class="mb-4 px-1">
                        <p class="text-xs text-slate-500">
                            <span x-text="selectedDates.length"></span> date<span x-show="selectedDates.length > 1">s</span>,
                            <span x-text="selectedTimes.length"></span> time<span x-show="selectedTimes.length > 1">s</span>
                        </p>
                    </div>
                </template>

            </div>
        </template>

        <!-- Error state -->
        <template x-if="!loading && error">
            <div class="glass rounded-2xl border border-red-500/20 p-6 text-center fade-in">
                <p class="text-red-400 text-sm" x-text="error"></p>
                <a href="/browse" class="text-brand-400 text-sm mt-3 inline-block hover:text-brand-300">Back to browse</a>
            </div>
        </template>

    </main>

    <!-- Fixed bottom CTA -->
    <div class="fixed bottom-0 inset-x-0 z-40 glass border-t border-slate-700/50 p-4 pb-safe" x-show="canSubmit" x-transition>
        <div class="max-w-lg mx-auto">
            <button
                @click="submitBooking()"
                :disabled="submitting"
                class="w-full py-3.5 rounded-2xl font-semibold text-base transition-all"
                :class="submitting
                    ? 'bg-brand-500/50 text-white/50 cursor-wait'
                    : 'bg-brand-500 text-white hover:bg-brand-400 active:scale-[0.98]'"
            >
                <span x-show="!submitting">Get This Table</span>
                <span x-show="submitting" class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"/>
                    </svg>
                    Setting up...
                </span>
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div
        x-show="toast" x-transition
        class="fixed top-16 right-4 z-50 glass border border-slate-700/50 rounded-xl px-4 py-3 max-w-xs toast-enter"
    >
        <p class="text-sm text-white" x-text="toast"></p>
    </div>

    <script>
    function restaurantApp() {
        return {
            // State
            loading: true,
            error: null,
            restaurant: null,
            currentMonth: new Date(),
            selectedDates: [],
            selectedTimes: [],
            partySize: 2,
            bookEarliest: false,
            latestNotify: 2,
            submitting: false,
            toast: null,
            venueId: {{ venue_id }},

            async init() {
                const token = localStorage.getItem('tablement_token');
                if (!token) {
                    window.location.href = '/';
                    return;
                }

                try {
                    const resp = await fetch(`/api/curated/${this.venueId}`);
                    const data = await resp.json();
                    if (data.restaurant) {
                        this.restaurant = data.restaurant;
                    } else {
                        this.error = 'Restaurant not found';
                    }
                } catch (e) {
                    this.error = 'Failed to load restaurant data';
                }
                this.loading = false;
            },

            // ==================== Calendar Logic ====================

            get monthLabel() {
                return this.currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            },

            prevMonth() {
                const d = new Date(this.currentMonth);
                d.setMonth(d.getMonth() - 1);
                // Don't go before current month
                const now = new Date();
                if (d.getFullYear() > now.getFullYear() || (d.getFullYear() === now.getFullYear() && d.getMonth() >= now.getMonth())) {
                    this.currentMonth = d;
                }
            },

            nextMonth() {
                const d = new Date(this.currentMonth);
                d.setMonth(d.getMonth() + 1);
                // Don't go more than 3 months ahead
                const limit = new Date();
                limit.setMonth(limit.getMonth() + 3);
                if (d <= limit) {
                    this.currentMonth = d;
                }
            },

            get lastReleasedDate() {
                if (!this.restaurant || !this.restaurant.drop_days_ahead) return null;
                const d = new Date();
                d.setDate(d.getDate() + this.restaurant.drop_days_ahead);
                // Normalize to midnight
                d.setHours(0, 0, 0, 0);
                return d;
            },

            isReleasedDate(dateStr) {
                if (!this.lastReleasedDate) return true; // If no drop policy, assume all released
                const d = new Date(dateStr + 'T00:00:00');
                return d <= this.lastReleasedDate;
            },

            isUnreleasedDate(dateStr) {
                return !this.isReleasedDate(dateStr);
            },

            get calendarCells() {
                const year = this.currentMonth.getFullYear();
                const month = this.currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                const cells = [];

                // Empty cells before first day
                for (let i = 0; i < firstDay; i++) {
                    cells.push({ key: `e${i}`, day: null, dateStr: null, isPast: true, isToday: false, isReleased: false, isUnreleased: false });
                }

                // Day cells
                for (let d = 1; d <= daysInMonth; d++) {
                    const cellDate = new Date(year, month, d);
                    cellDate.setHours(0, 0, 0, 0);
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const isPast = cellDate < today;
                    const isToday = cellDate.getTime() === today.getTime();

                    cells.push({
                        key: dateStr,
                        day: d,
                        dateStr,
                        isPast,
                        isToday,
                        isReleased: !isPast && this.isReleasedDate(dateStr),
                        isUnreleased: !isPast && this.isUnreleasedDate(dateStr),
                    });
                }

                return cells;
            },

            cellClasses(cell) {
                if (!cell.day) return 'cal-empty';
                if (cell.isPast) return 'cal-past opacity-25 cursor-default pointer-events-none text-slate-600';

                const isSelected = this.selectedDates.includes(cell.dateStr);

                if (isSelected) {
                    return 'bg-brand-500 text-white font-bold scale-105 shadow-lg shadow-brand-500/20';
                }

                if (cell.isReleased) {
                    return 'bg-red-500/10 border border-red-400/20 text-slate-200 hover:bg-red-500/20 hover:border-red-400/40';
                }

                if (cell.isUnreleased) {
                    return 'bg-amber-500/10 border border-amber-400/30 text-slate-200 hover:bg-amber-500/20 hover:border-amber-400/50';
                }

                return 'text-slate-400';
            },

            toggleDate(dateStr) {
                if (!dateStr) return;

                const idx = this.selectedDates.indexOf(dateStr);
                if (idx >= 0) {
                    this.selectedDates.splice(idx, 1);
                    return;
                }

                // Enforce limits: max 5 released dates
                if (this.isReleasedDate(dateStr)) {
                    const currentReleased = this.selectedDates.filter(d => this.isReleasedDate(d)).length;
                    if (currentReleased >= 5) {
                        this.showToast('Max 5 sold-out dates');
                        return;
                    }
                }

                this.selectedDates.push(dateStr);
                this.selectedDates.sort();
            },

            // ==================== Time Picker Logic ====================

            get timePills() {
                if (!this.restaurant) return [];
                const start = this.parseTime(this.restaurant.service_start || '17:00');
                const end = this.parseTime(this.restaurant.service_end || '22:00');
                const hotStart = this.parseTime(this.restaurant.hot_start || '19:00');
                const hotEnd = this.parseTime(this.restaurant.hot_end || '20:30');

                const pills = [];
                let t = start;
                while (t <= end) {
                    const h = Math.floor(t / 60);
                    const m = t % 60;
                    const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                    const h12 = h > 12 ? h - 12 : h;
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    const label = `${h12}:${String(m).padStart(2, '0')}`;

                    pills.push({
                        time: timeStr,
                        label,
                        isHot: t >= hotStart && t <= hotEnd,
                    });
                    t += 30;
                }
                return pills;
            },

            parseTime(str) {
                // Parse "HH:MM" to minutes since midnight
                const [h, m] = str.split(':').map(Number);
                return h * 60 + (m || 0);
            },

            timeClasses(tp) {
                const isSelected = this.selectedTimes.includes(tp.time);
                if (isSelected) {
                    return 'bg-brand-500 text-white border-brand-500';
                }
                if (tp.isHot) {
                    return 'bg-slate-800/50 text-slate-200 border-orange-400/30 hover:bg-orange-500/10 hover:border-orange-400/50';
                }
                return 'bg-slate-800/50 text-slate-300 border-slate-600/50 hover:bg-slate-700/50 hover:border-slate-500';
            },

            toggleTime(timeStr) {
                const idx = this.selectedTimes.indexOf(timeStr);
                if (idx >= 0) {
                    this.selectedTimes.splice(idx, 1);
                } else {
                    this.selectedTimes.push(timeStr);
                    this.selectedTimes.sort();
                }
            },

            // ==================== Computed Properties ====================

            get releasedCount() {
                return this.selectedDates.filter(d => this.isReleasedDate(d)).length;
            },

            get hasReleasedSelected() {
                return this.releasedCount > 0;
            },

            get hasUnreleasedSelected() {
                return this.selectedDates.some(d => this.isUnreleasedDate(d));
            },

            get canSubmit() {
                return this.selectedDates.length > 0 && this.selectedTimes.length > 0 && !this.loading;
            },

            // ==================== Submit ====================

            async submitBooking() {
                if (this.submitting || !this.canSubmit) return;
                this.submitting = true;

                const token = localStorage.getItem('tablement_token');
                if (!token) {
                    window.location.href = '/';
                    return;
                }

                // Build drop_time from restaurant data (for unreleased dates)
                let dropTime = null;
                if (this.restaurant.drop_days_ahead) {
                    dropTime = {
                        hour: this.restaurant.drop_hour || 10,
                        minute: this.restaurant.drop_minute || 0,
                        second: 0,
                        timezone: 'America/New_York',
                        days_ahead: this.restaurant.drop_days_ahead,
                    };
                }

                const payload = {
                    venue_id: this.venueId,
                    venue_name: this.restaurant.name,
                    party_size: this.partySize,
                    dates: this.selectedDates,
                    time_preferences: this.selectedTimes.map(t => ({ time: t, seating_type: null })),
                    drop_time: dropTime,
                    book_earliest: this.bookEarliest,
                    latest_notify_hours: parseFloat(this.latestNotify),
                };

                try {
                    const resp = await fetch('/api/reservations/batch', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                        },
                        body: JSON.stringify(payload),
                    });

                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.detail || 'Failed to create reservations');
                    }

                    const data = await resp.json();
                    // Redirect to reservations page with success toast
                    window.location.href = '/reservations?toast=' + encodeURIComponent("We're on it! Watching " + this.selectedDates.length + " date" + (this.selectedDates.length > 1 ? 's' : ''));

                } catch (e) {
                    this.showToast(e.message || 'Something went wrong');
                    this.submitting = false;
                }
            },

            // ==================== Toast ====================

            showToast(msg) {
                this.toast = msg;
                setTimeout(() => { this.toast = null; }, 3000);
            },
        };
    }
    </script>

</body>
</html>
